embedding:
  provider: "ollama"
  model: "qwen3-embedding:4b"
  base_url: "http://localhost:11434"
  batch_size: 16
  dimension: 2560

vector_store:
  type: "milvus"
  milvus:
    mode: "remote"
    local_uri: "./milvus_wiki.db"
    remote_host: "localhost"
    remote_port: 19530
    collection: "wiki_rag"

retrieval:
  top_k: 10
  semantic_weight: 1.0
  keyword_weight: 0.0

mcp_server:
  transport: "streamable-http"
  host: "127.0.0.1"
  port: 8000
  mount_path: "/mcp"
